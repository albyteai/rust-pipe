name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get install -y jq
          pip install websockets

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy (library)
        run: cargo clippy --lib -- -D warnings

      - name: Clippy (tests)
        run: cargo clippy --tests -- -D warnings -A deprecated

      - name: Build
        run: cargo build

      - name: Run tests
        run: cargo test

      - name: Docs build
        run: cargo doc --no-deps

      - name: Package check
        run: cargo package

      - name: No leaked references
        run: |
          if grep -rn 'amazon\|albinkm\|@gmail\|havocray' src/ sdks/ README.md Cargo.toml LICENSE* CHANGELOG.md 2>/dev/null; then
            echo "::error::Leaked internal references found"
            exit 1
          fi

      - name: Validate mermaid diagrams
        run: |
          npm install mermaid jsdom
          node --input-type=module <<'EOF'
          import { JSDOM } from 'jsdom';
          const dom = new JSDOM('', { url: 'http://localhost' });
          global.window = dom.window;
          global.document = dom.window.document;
          global.navigator = dom.window.navigator;
          global.DOMParser = dom.window.DOMParser;
          global.XMLSerializer = dom.window.XMLSerializer;

          const { default: mermaid } = await import('mermaid');
          import { readFileSync } from 'fs';
          mermaid.initialize({ startOnLoad: false });
          const content = readFileSync('README.md', 'utf8');
          const blocks = [...content.matchAll(/```mermaid\n([\s\S]*?)```/g)];
          let failed = false;
          for (const [, diagram] of blocks) {
            try {
              await mermaid.parse(diagram.trim());
            } catch (e) {
              console.error('FAIL:', e.message);
              failed = true;
            }
          }
          if (failed) process.exit(1);
          console.log(`All ${blocks.length} mermaid diagrams valid.`);
          EOF

      - name: Version in CHANGELOG
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          if ! grep -q "\[$VERSION\]" CHANGELOG.md; then
            echo "::error::Version $VERSION not found in CHANGELOG.md"
            exit 1
          fi

  coverage:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov

      - name: Install system dependencies
        run: |
          sudo apt-get install -y jq
          pip install websockets

      - name: Generate coverage
        run: cargo llvm-cov --lcov --output-path lcov.info

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false

  publish:
    runs-on: ubuntu-latest
    needs: [validate, coverage]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Verify tag matches Cargo.toml version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | cut -d'"' -f2)
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag v$TAG_VERSION does not match Cargo.toml version $CARGO_VERSION"
            exit 1
          fi

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish
